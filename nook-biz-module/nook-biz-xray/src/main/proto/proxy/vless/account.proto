syntax = "proto3";

// xtls/xray-core: proxy/vless/account.proto
package xray.proxy.vless;

option java_package = "com.xray.proxy.vless";
option java_multiple_files = true;
option java_outer_classname = "AccountProto";

message Account {
    // UUID
    string id = 1;
    // 流控, 例如 "xtls-rprx-vision"; 留空表示无流控
    string flow = 2;
    // 加密, vless 一般固定 "none"
    string encryption = 3;
}
