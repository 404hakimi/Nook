syntax = "proto3";

// xtls/xray-core: app/proxyman/command/command.proto
// 仅 vendor nook 实际用到的子集:
//   - AlterInbound + AddUserOperation/RemoveUserOperation: 加/删 vmess/vless/trojan client (运行时, 无需重启)
//   - RemoveInbound / RemoveOutbound: 用于线路 / 出站清理(可选)
// AddInbound/AddOutbound 需依赖 xray.core.{InboundHandlerConfig,OutboundHandlerConfig}, 这两个 proto
// 进一步引用 transport/internet 等深层依赖, 体量太大. nook 走"重写 xray.json + reload"做出站/路由的持久化变更,
// 因此这里不包含 AddInbound / AddOutbound.
package xray.app.proxyman.command;

import "common/protocol/user.proto";
import "common/serial/typed_message.proto";

option java_package = "com.xray.app.proxyman.command";
option java_multiple_files = true;
option java_outer_classname = "CommandProto";

// =============== AlterInbound 操作族 ===============

// 给 inbound 加一个 user (运行时立刻生效)
message AddUserOperation {
    xray.common.protocol.User user = 1;
}

// 按 email 删除一个 user
message RemoveUserOperation {
    string email = 1;
}

// AlterInbound 请求 / 响应
//   tag: inbound 的 tag, 例如 "vmess-in"
//   operation: TypedMessage 包 AddUserOperation / RemoveUserOperation
message AlterInboundRequest {
    string tag = 1;
    xray.common.serial.TypedMessage operation = 2;
}

message AlterInboundResponse {
}

// =============== Inbound 整体增删 (按 tag) ===============

message RemoveInboundRequest {
    string tag = 1;
}

message RemoveInboundResponse {
}

// =============== Outbound 整体增删 (按 tag) ===============

message RemoveOutboundRequest {
    string tag = 1;
}

message RemoveOutboundResponse {
}

// =============== HandlerService ===============

service HandlerService {
    // 改变已存在 inbound 的内部状态 (加/删 user)
    rpc AlterInbound(AlterInboundRequest) returns (AlterInboundResponse) {}

    // 删除 inbound (按 tag); 上层若想"换 vmess 端口"等场景会用
    rpc RemoveInbound(RemoveInboundRequest) returns (RemoveInboundResponse) {}

    // 删除 outbound (按 tag)
    rpc RemoveOutbound(RemoveOutboundRequest) returns (RemoveOutboundResponse) {}
}
