syntax = "proto3";

// xtls/xray-core: app/stats/command/command.proto
package xray.app.stats.command;

option java_package = "com.xray.app.stats.command";
option java_multiple_files = true;
option java_outer_classname = "CommandProto";

// 单条流量统计项
//   name 形式举例:
//     user>>>{email}>>>traffic>>>uplink
//     user>>>{email}>>>traffic>>>downlink
//     inbound>>>{tag}>>>traffic>>>uplink
//     outbound>>>{tag}>>>traffic>>>downlink
message Stat {
    string name  = 1;
    int64  value = 2;
}

// 单 key 查询
message GetStatsRequest {
    string name  = 1;
    bool   reset = 2;
}

message GetStatsResponse {
    Stat stat = 1;
}

// 按 pattern 批量查询
//   pattern: 子串匹配 (regexp=false) 或正则 (regexp=true)
message QueryStatsRequest {
    string pattern = 1;
    bool   reset   = 2;
    bool   regexp  = 3;
}

message QueryStatsResponse {
    repeated Stat stat = 1;
}

// 系统级计数器 (uptime / number of goroutines 等), nook 暂不用
message SysStatsRequest {
}

message SysStatsResponse {
    uint32 NumGoroutine = 1;
    uint32 NumGC        = 2;
    uint64 Alloc        = 3;
    uint64 TotalAlloc   = 4;
    uint64 Sys          = 5;
    uint64 Mallocs      = 6;
    uint64 Frees        = 7;
    uint64 LiveObjects  = 8;
    uint64 PauseTotalNs = 9;
    uint32 Uptime       = 10;
}

service StatsService {
    rpc GetStats(GetStatsRequest)         returns (GetStatsResponse) {}
    rpc QueryStats(QueryStatsRequest)     returns (QueryStatsResponse) {}
    rpc GetSysStats(SysStatsRequest)      returns (SysStatsResponse)   {}
}
