syntax = "proto3";

// Xray TypedMessage 是所有"多态字段"的载体, 例如 User.account / AlterInboundRequest.operation:
//   不同协议对应不同的 Account proto, Xray 用 (type_url + value bytes) 把 polymorphism 编码成一个固定字段
// 这里 vendor 自 xtls/xray-core: common/serial/typed_message.proto
package xray.common.serial;

option java_package = "com.xray.common.serial";
option java_multiple_files = true;
option java_outer_classname = "TypedMessageProto";

message TypedMessage {
    // 完整的 proto type name, e.g. "xray.proxy.vmess.Account"
    string type = 1;
    // 该 type 的序列化 bytes (proto3 wire format)
    bytes value = 2;
}
