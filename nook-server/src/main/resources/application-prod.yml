spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${NOOK_DB_HOST:127.0.0.1}:${NOOK_DB_PORT:3306}/${NOOK_DB_NAME:nook}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${NOOK_DB_USER}
    password: ${NOOK_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      # initialization-fail-timeout: -1
  data:
    redis:
      host: ${NOOK_REDIS_HOST}
      port: ${NOOK_REDIS_PORT:6379}
      password: ${NOOK_REDIS_PASSWORD}
      database: 0

sa-token:
  timeout: 3600
  is-print: false

nook:
  # 客户端 (/portal/**) 请求验签; secret 与 nook-client 内置值一致
  portal-sign:
    enabled: ${NOOK_PORTAL_SIGN_ENABLED:true}
    secret: ${NOOK_PORTAL_SIGN_SECRET:}
  agent:
    src-dir: nook-agent
    # Agent 装机 / 升级回拉 backend binary 的公网 URL; 生产用真实域名 (e.g. https://api.nook.example.com)
    backend-public-url: ${NOOK_BACKEND_PUBLIC_URL:}
    job:
      # Agent 心跳监控 / 告警 (仅状态变化时打日志)
      heartbeat-timeout-cron: "30 * * * * ?"
  # 各模块定时任务 (cron 为 Quartz 6 段式: 秒 分 时 日 月 周)
  trade:
    job:
      # 订阅生命周期巡检: 到期释放 + 流量耗尽停服 + 周期重置恢复; 每 5 分钟一次, 对齐落地机流量上报周期
      lifecycle-cron: "15 0/5 * * * ?"
      # 线路机故障自动切换
      failover:
        # 总开关; 默认关, 确认无误再开
        enabled: true
        cron: "45 * * * * ?"
        # 单轮每机最多迁移的 THROTTLED(到顶)订阅数; OFFLINE 紧急迁移不限
        throttled-batch: 5
  # 落地机流量月度重置所用时区
  traffic:
    reset-zone: Asia/Shanghai

logging:
  level:
    com.nook: INFO
    cn.dev33.satoken: WARN
    com.nook.biz: INFO
  file:
    name: ${user.home}/${spring.application.name}-logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
      total-size-cap: 500MB
