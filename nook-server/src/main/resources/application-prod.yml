server:
  port: ${NOOK_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${NOOK_DB_HOST:127.0.0.1}:${NOOK_DB_PORT:3306}/${NOOK_DB_NAME:nook}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${NOOK_DB_USER}
    password: ${NOOK_DB_PASSWORD}
    hikari:
      # 抢在 MySQL wait_timeout / 链路 NAT 切 TCP 之前主动回收, keepalive 防 idle 死连接.
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 60000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${NOOK_REDIS_HOST}
      port: ${NOOK_REDIS_PORT:6379}
      password: ${NOOK_REDIS_PASSWORD}
      database: 0

sa-token:
  timeout: 3600
  is-print: false

nook:
  node:
    grpc-local-port-base: 10085
  monitor:
    snapshot-interval-seconds: 300
  traffic:
    # xray in-memory stats 定时入库; 关闭后 getTraffic 退化为只看 in-memory (跨重启会丢)
    enabled: true
    # 采样间隔 ms; 默认 30 min, 与 XRAY_RESTART 前置 sample 配合, 实际丢失窗口 ≤ 30 min
    sample-interval-ms: 1800000
    # 应用启动后多久跑第一次 sweep, 避免 xray_node 缓存 / SSH manager 还没就绪
    initial-delay-ms: 60000

logging:
  level:
    com.nook: INFO
    cn.dev33.satoken: WARN
    # com.nook.biz: DEBUG
