      port: 26391
      database: 15
      password: zqwl2024

sa-token:
  timeout: 28800
  is-print: false

nook:
  agent:
    src-dir: nook-agent
    # Agent 装机 / 升级回拉 backend binary 的公网 URL; dev 走 natapp 隧道, 生产用真实域名
    backend-public-url: "${NOOK_BACKEND_PUBLIC_URL:https://nook.nat100.top}"
    job:
      # Agent 心跳监控 / 告警 (仅状态变化时打日志)
      heartbeat-timeout-cron: "30 * * * * ?"
  # 各模块定时任务 (cron 为 Quartz 6 段式: 秒 分 时 日 月 周)
  trade:
    job:
      # 订阅生命周期巡检: 到期释放 + 流量耗尽停服 + 周期重置恢复; 每 5 分钟一次, 对齐落地机流量上报周期
      lifecycle-cron: "15 0/5 * * * ?"
      # 线路机故障自动切换
      failover:
        # 总开关; 默认关, 确认无误再开
        enabled: false
        cron: "45 * * * * ?"
        # 单轮每机最多迁移的 THROTTLED(到顶)订阅数; OFFLINE 紧急迁移不限
        throttled-batch: 5
  # 落地机流量月度重置所用时区
  traffic:
    reset-zone: Asia/Shanghai

logging:
  level:
    com.nook: INFO
    cn.dev33.satoken: INFO
    com.nook.biz: INFO
  file:
    name: ${user.home}/${spring.application.name}-logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
      total-size-cap: 500MB
